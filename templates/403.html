{% extends "main.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-header text-center"
                     style="background:#D71920;color:#FFFFFF;">
                    <h4 class="mb-0">
                        <i class="bi bi-shield-exclamation me-2"></i>
                        Access Denied
                    </h4>
                </div>

                <div class="card-body text-center p-4"
                     style="background:#FFFFFF;color:#2E2E2E;">

                    <i class="bi bi-lock-fill"
                       style="font-size:4rem;color:#FDBB30;"></i>

                    <h5 class="mt-3 fw-bold">You don’t have permission</h5>

                    <p class="mt-2">
                        You are not authorized to access or modify this officer’s
                        profile based on your current role and region.
                    </p>

                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <a href="javascript:history.back()"
                           class="btn"
                           style="background:#8BC0A9;color:#2E2E2E;">
                            Go Back
                        </a>

                        <a href="{% url 'admin_dash:home' %}"
                           class="btn"
                           style="background:#D71920;color:#FFFFFF;">
                            Dashboard
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
