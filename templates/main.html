{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>
            {% block title %}
                HomePage
            {% endblock title %}
        </title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        
        <link rel="stylesheet" href="{% static 'base/css/all.css' %}">
        <link rel="stylesheet" href="{% static 'base/queries.css' %}">
        <link rel="stylesheet" href="{% static 'base/styles.css' %}">
        <link rel="stylesheet" href="{% static 'base/bootstrap.min.css' %}">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
        <link href="https://unpkg.com/cropperjs/dist/cropper.min.css" rel="stylesheet">
<script src="https://unpkg.com/cropperjs/dist/cropper.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>


    </head>

    <body>
        {% include 'navbar.html' %}
        {% include 'message_alert.html' %}
        
        {% block content %}
        {% endblock content %}

        <script src="{% static 'base/bootstrap.bundle.min.js' %}" async defer></script>
        <script src="{% static 'base/scripts.js' %}"></script>
        <script>
              // Auto-dismiss alerts after 4 seconds
    window.addEventListener('DOMContentLoaded', (event) => {
        const alerts = document.querySelectorAll('.alert-message');
        alerts.forEach((alert) => {
            setTimeout(() => {
                alert.style.transition = "opacity 0.5s ease-out";
                alert.style.opacity = "0";
                setTimeout(() => alert.remove(), 500);
            }, 4000); // 4000ms = 4 seconds
        });
    });
        </script>
        
    </body>
   

</html>
