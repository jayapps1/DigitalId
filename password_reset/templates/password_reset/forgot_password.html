{% extends "main.html" %}
{% load widget_tweaks %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow" style="width: 400px; border-radius: 10px;">
        <div class="card-header text-center" style="background-color: #FDBB30; color: #2E2E2E;">
            <h3>GNFS Password Reset</h3>
        </div>
        <div class="card-body" style="background-color: #FFFFFF;">
            <form method="post">
                {% csrf_token %}
                {{ form.non_field_errors }}
                <div class="mb-3">
                    <label class="form-label" style="color:#2E2E2E;">Service Number</label>
                    {{ form.service_number|add_class:"form-control" }}
                </div>
                <div class="mb-3">
                    <label class="form-label" style="color:#2E2E2E;">Registered Phone</label>
                    {{ form.phone|add_class:"form-control" }}
                </div>
                <button type="submit" class="btn w-100" style="background-color:#D71920; color:#FFFFFF;">Send OTP</button>
            </form>
        </div>
        <div class="card-footer text-center" style="background-color:#8BC0A9; color:#2E2E2E;">
            <small>GNFS System Access Portal</small>
        </div>
    </div>
</div>
{% endblock %}
