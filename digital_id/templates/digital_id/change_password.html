{% extends "main.html" %}
{% load widget_tweaks %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow" style="width: 500px; border-radius: 10px;">
        <div class="card-header text-center" style="background-color: #FDBB30; color:#2E2E2E;">
            <h3>Change Password</h3>
        </div>
        <div class="card-body" style="background-color: #FFFFFF;">
            <form method="post" action="{% url 'digital_id:change_password' %}">
                {% csrf_token %}
                {{ form.non_field_errors }}
                {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label" style="color:#2E2E2E;">{{ field.label }}</label>
                    {{ field|add_class:"form-control" }}
                    {% if field.errors %}
                        <div class="text-danger mt-1">{{ field.errors }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn w-100" style="background-color: #D71920; color:#FFFFFF;">Update Password</button>
            </form>
        </div>
        <div class="card-footer text-center" style="background-color:#8BC0A9; color:#2E2E2E;">
            <a href="{% url 'officers_dash:dashboard' %}" class="text-decoration-none" style="color:#2E2E2E;">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
